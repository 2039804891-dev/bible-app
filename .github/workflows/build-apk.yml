name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets to www
        run: |
          mkdir -p www/css www/js www/data www/icons
          cp index.html www/
          cp manifest.json www/
          cp capacitor.config.json www/
          cp css/style.css www/css/
          cp js/app.js www/js/
          cp js/bible-data.js www/js/
          cp data/*.json www/data/
          cp icons/*.png www/icons/

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bible-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk