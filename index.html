<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FFFDF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="圣经">
<meta name="format-detection" content="telephone=no">
<title>圣经</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar" id="topBar">
  <button class="btn-icon" id="btnBack" style="visibility:hidden" title="返回">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div style="flex:1;min-width:0">
    <div class="top-bar-title" id="topTitle">圣经</div>
    <div class="top-bar-subtitle" id="topSubtitle"></div>
  </div>
  <button class="btn-icon" id="btnSettings" title="设置">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<!-- 主内容 -->
<div class="main-content">
  <!-- 书卷列表视图 -->
  <div class="view active" id="viewBooks">
    <div class="continue-reading" id="continueReading" style="display:none"></div>
    <div id="booksContainer"></div>
  </div>

  <!-- 章节视图 -->
  <div class="view" id="viewChapters">
    <div id="chaptersContainer"></div>
  </div>

  <!-- 阅读视图 -->
  <div class="view" id="viewReading">
    <div class="reading-header" id="readingHeader"></div>
    <div class="chapter-nav" id="chapterNavTop"></div>
    <div class="verses-container" id="versesContainer"></div>
    <div class="chapter-nav" id="chapterNavBottom"></div>
  </div>

  <!-- AI 讲解全屏视图 -->
  <div class="view" id="viewAiChat">
    <div class="ai-chat-area" id="aiChatArea"></div>
    <div class="ai-input-row">
      <textarea id="aiInput" placeholder="输入你的问题..." rows="1"></textarea>
      <button class="btn-send" id="btnAiSend">发送</button>
    </div>
  </div>

  <!-- 设置视图 -->
  <div class="view" id="viewSettings">
    <div class="settings-section">
      <h3>DeepSeek API Key</h3>
      <p class="setting-desc" style="margin-bottom:8px">用于AI牧师讲解功能。在 <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener" style="color:var(--accent)">platform.deepseek.com</a> 获取。</p>
      <input type="password" class="input-text" id="inputApiKey" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">
      <button class="btn-nav" id="btnSaveApiKey" style="margin-top:12px;width:100%">保存 API Key</button>
      <p class="setting-desc" id="apiKeyStatus" style="margin-top:8px"></p>
    </div>
    <div class="settings-section">
      <h3>字体大小</h3>
      <div class="font-size-options" id="fontSizeOptions">
        <button class="btn-font-size" data-size="0.8">小</button>
        <button class="btn-font-size active" data-size="1">中</button>
        <button class="btn-font-size" data-size="1.2">大</button>
        <button class="btn-font-size" data-size="1.4">特大</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>关于</h3>
      <p class="setting-desc">圣经和合本（CUV） &middot; 完整66卷</p>
      <p class="setting-desc">AI讲解由 DeepSeek 驱动</p>
      <p class="setting-desc">经文数据来源：bolls.life</p>
    </div>
  </div>
</div>

<!-- 选中经文工具栏 -->
<div class="selection-toolbar" id="selectionToolbar">
    <div class="sel-toolbar-top">
      <span class="selection-ref" id="selectionRef"></span>
      <button class="btn-icon btn-close-sel" id="btnClearSelection" title="取消选择">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sel-toolbar-actions">
      <button class="btn-sel-action primary" id="btnAiExplainSelected">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        AI讲解选中
      </button>
      <button class="btn-sel-action" id="btnAiExplainChapter">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        AI讲解全章
      </button>
      <button class="btn-sel-action" id="btnAiCustomQuestion">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        自定义提问
      </button>
    </div>
  </div>

<!-- 底部导航 -->
<div class="bottom-bar" id="bottomBar">
  <button class="bottom-btn active" data-view="books" id="bottomBooks">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    书卷
  </button>
  <button class="bottom-btn" data-view="home" id="bottomHome">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    首页
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/js/bible-data.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
